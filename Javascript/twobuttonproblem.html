<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Document</title>
</head>
<body>
<button id="red">RED</button>
<button id="blue">BLUE</button>



<script>



let redBtn = document.getElementById("red").onclick =handleClick("red");
let blueBtn = document.getElementById("blue").onclick =handleClick("blue");

function handleClick(color){
   return function(){
   document.body.style.backgroundColor = `${color}`;
   }
   
}
</script>
   
</body>
</html>
