       ========================================================================
       HTML FORMS & STRUCTURAL CONTROLS
       ========================================================================
       Forms are used to capture, structure, and submit user data to a server.
   -->

   <!-- 
       ========================================================================
       1. FORM ELEMENT WRAPPER (<form>)
       ========================================================================
       - PURPOSE: Container for all interactive input controls.
       - KEY ATTRIBUTES:
         * "action": Specifies the destination URL where form data is sent on submit.
         * "method": The HTTP protocol method used to transmit data:
           - "GET": Appends form data to the URL as key/value pairs (query string). 
             * Visibility: Visible in the browser address bar.
             * Security: Non-secure. Do not use for passwords or sensitive data.
             * Length: Limited by URL size constraints.
             * Caching: Can be bookmarked and cached.
           - "POST": Sends form data inside the HTTP request body.
             * Visibility: Hidden from the URL bar.
             * Security: More secure (though SSL/HTTPS is still required for encryption).
             * Length: No payload size limit.
             * Caching: Cannot be bookmarked or cached.
   -->

   <!-- 
       ========================================================================
       2. SEMANTIC FORM GROUPING (<fieldset>, <legend>, <label>)
       ========================================================================
       - <fieldset>:
         * PURPOSE: Groups related data fields inside a form.
         * DISPLAY: Usually draws a thin border outline around grouped fields.
       - <legend>:
         * PURPOSE: Serves as the visual caption and semantic header for the <fieldset>.
         * ACCESSIBILITY: Read by screen readers when navigating between fields in the group.
       - <label>:
         * PURPOSE: Associates text descriptions directly with input controls.
         * ATTRIBUTE "for": Binds the label to an input's "id" (e.g., <label for="email"> goes with <input id="email">).
         * A11Y VALUE: Screen readers read labels aloud when the input is focused. Also increases the clickable area: clicking the label text focuses or checks the associated input.
   -->

   <!-- 
       ========================================================================
       3. ANCHOR HYPERLINKS & MAILTO PATHS (<a>)
       ========================================================================
       - PURPOSE: Defines an anchor hyperlink to navigate to another page or location.
       - KEY ATTRIBUTES:
         * "href" (Hypertext Reference): Holds the URL or path being targeted.
         * "target": Tells the browser where to open the link:
           - "_self" (Default): Opens the link in the same window/tab.
           - "_blank": Opens the link in a brand new browser window or tab.
       - MAILTO PROTOCOL:
         * SYNTAX: href="mailto:someone@example.com?subject=Hello"
         * PURPOSE: Tells the operating system/browser to launch the default email client (e.g. Outlook, Mail, Gmail) to compose a message pre-populated with the specified email address, subject, or body parameters.
   -->
