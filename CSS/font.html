<!DOCTYPE html>
<html lang="en">
<head>
      <!-- IN-DEPTH NOTES (Fonts & Performance)
         Purpose: Demonstrates how to load and apply a Google Font and why
         `preconnect` helps performance.

         Key points:
         - Use the link provided by Google Fonts to import the font.
         - `font-family` accepts a prioritized list; always include web-safe fallbacks.
         - `preconnect` hints let the browser open early connections to font hosts,
         reducing latency.

         Accessibility & performance:
         - Avoid loading many font weights/styles; prefer 1–2 weights for most pages.
         - Consider `font-display: swap` to reduce invisible text during font load.

         Exercises:
         1) Replace the Google Fonts link with a different family and apply it.
         2) Try adding `font-display=swap` to the Google URL and observe FOUT behavior.
      -->
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+S+Guides:ital@0;1&display=swap" rel="stylesheet">
   <style>
      h1{
          font-family: "Playwrite GB S Guides", sans-serif;
      }
   </style>
</head>
<body>
   <h1>Satya is very talented</h1>
   <h1>Shubham is Very Curious guy</h1>
   
</body>
</html>
