<!DOCTYPE html>
<html lang="en">
<head>
      <!-- IN-DEPTH NOTES (Animation)
         Purpose: Demonstrates a simple looping animation using @keyframes.

         Key concepts explained:
         - @keyframes defines named animation steps (0% -> 100%).
         - `animation-name` links the element to the @keyframes block.
         - `animation-duration` controls how long one cycle lasts.
         - `animation-iteration-count: infinite` repeats the animation.
         - `animation-timing-function` changes motion feel (ease, linear, ease-in-out).

         Walkthrough of this example:
         - The `.ball` element is centered in a `.playground` and animated using
         `transform: translateY(...)` to create a vertical bounce effect.
         - At 50% the ball moves up (-300px) and its background color changes.

         Experiments for students:
         1) Change `animation-duration` to `0.6s` and `2s` to see faster/slower bounces.
         2) Replace `ease-out` with `cubic-bezier(.25,.8,.25,1)` to feel different easing.
         3) Use `transform: scale(1.2)` at 50% to combine movement + scaling.
         4) Try `animation-fill-mode: forwards` to keep the end state.

         Common pitfalls:
         - Animating costly properties (like `width`/`height`) can cause jank.
         - Use `transform` and `opacity` for smoother GPU-accelerated animations.
      -->
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <style>
      *{
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }
      .playground{
         height: 600px;
         width: 400px;
         background-color: green;
         display: flex;
         align-items: flex-end;
         justify-content: center;
      }
      .ball{
         height: 100px;
         width: 100px;
         background-color: white;
         border-radius: 50%;
         display: flex;
         justify-content: center;
         align-items: center;

         animation-name: bounce;
         animation-duration: 1s;
         animation-iteration-count: infinite;
         animation-timing-function: ease-out;
      }

      @keyframes bounce{
         0%{
            transform: translateY(0);
         }
         50%{
            transform: translateY(-300px);
            background-color: royalblue;
         }
         100%{
            transform: translateY(0);
         }
      }
   </style>
</head>
<body>
   <div class="playground">
      <div class="ball">RCB VS GT</div>
   </div>
   
</body>
</html>
